<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>邓卉敏生日快乐</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
}

.card {
    background: white;
    padding: 50px;
    border-radius: 25px;
    text-align: center;
    box-shadow: 0 15px 40px rgba(0,0,0,0.2);
    animation: fadeIn 2s ease-in-out;
}

h1 {
    font-size: 36px;
    color: #ff4b5c;
}

p {
    font-size: 20px;
    color: #555;
}

button {
    margin-top: 20px;
    padding: 12px 25px;
    font-size: 18px;
    border: none;
    border-radius: 20px;
    background: #ff4b5c;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #ff6f7d;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>

<script>
function surprise() {
    alert("🎉 邓卉敏老师，生日快乐！愿你永远开心漂亮！");
}
</script>

</head>

<body>

<div class="card">
    <h1>🎂 邓卉敏老师 🎂</h1>
    <p>生日快乐！</p>
    <p>愿你新的一岁，</p>
    <p>平安喜乐，万事胜意 ✨</p>
    <button onclick="surprise()">点击惊喜</button>
</div>

</body>
</html>
